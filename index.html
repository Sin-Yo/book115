<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>士林夜市五大美食介紹</title>

<style>
body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial;
    background: #f5f5f5;
}

/* 頂部 */
header {
    background: url("https://upload.wikimedia.org/wikipedia/commons/4/4c/Shilin_Night_Market.jpg") center/cover no-repeat;
    color: white;
    text-align: center;
    padding: 70px 20px;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
}

header h1 {
    margin: 0;
    font-size: 2.8em;
}

/* 導覽列 */
nav {
    background: #222;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-size: 1.1em;
}

nav a:hover {
    color: #ffd700;
}

/* 內容區 */
.container {
    max-width: 1100px;
    margin: 30px auto;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

/* 卡片 */
.food {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.food:hover {
    transform: translateY(-8px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.food img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.food h2 {
    margin: 15px;
    color: #333;
}

.food p {
    margin: 0 15px 15px 15px;
    color: #555;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: #222;
    color: white;
    margin-top: 30px;
}
</style>
</head>

<body>

<header>
    <h1>士林夜市五大美食</h1>
    <p>台灣最具代表性的夜市之一</p>
</header>

<nav>
    <a href="#">首頁</a>
    <a href="#">美食介紹</a>
    <a href="#">聯絡我們</a>
</nav>

<div class="container">

    <div class="food">
        <img src="images/1photo.jpg">
        <h2>豪大大雞排</h2>
        <p>外酥內嫩、份量超大的炸雞排，是士林夜市最具代表性的經典美食。</p>
    </div>

    <div class="food">
        <img src="images/2photo.jpg">
        <h2>蚵仔煎</h2>
        <p>新鮮蚵仔搭配雞蛋與地瓜粉，淋上特製醬料，是台灣必吃小吃。</p>
    </div>

    <div class="food">
        <img src="images/3photo.jpg">
        <h2>大腸包小腸</h2>
        <p>糯米腸包香腸，搭配蒜片與配料，鹹香濃郁、口感豐富。</p>
    </div>

    <div class="food">
        <img src="images/4photo.jpg">
        <h2>珍珠奶茶</h2>
        <p>Q彈珍珠搭配香濃奶茶，是台灣最具代表性的飲品之一。</p>
    </div>

    <div class="food">
        <img src="images/5photo.jpg">
        <h2>花枝燒</h2>
        <p>外酥內軟、口感彈牙，是夜市熱門的海鮮小吃。</p>
    </div>

</div>

<footer>
    © 士林夜市美食介紹 | 學生作業展示
</footer>

</body>
</html>
