<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>士林夜市五大美食介紹</title>

<style>
body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial;
    background: #f8f8f8;
}

header {
    background: url("https://upload.wikimedia.org/wikipedia/commons/4/4c/Shilin_Night_Market.jpg") center/cover no-repeat;
    color: white;
    text-align: center;
    padding: 60px 20px;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
}

header h1 {
    font-size: 2.5em;
}

.container {
    max-width: 1000px;
    margin: 30px auto;
    padding: 20px;
}

.food {
    background: white;
    margin-bottom: 25px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.food img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.food h2 {
    margin: 15px;
}

.food p {
    margin: 0 15px 15px 15px;
    color: #555;
}

footer {
    text-align: center;
    padding: 20px;
    background: #222;
    color: white;
}
</style>
</head>

<body>

<header>
    <h1>士林夜市五大美食</h1>
    <p>台灣最具代表性的夜市之一</p>
</header>

<div class="container">

    <!-- 1 大雞排 -->
    <div class="food">
        <img src="images/1photo.jpg">
        <h2>豪大大雞排</h2>
        <p>超大尺寸的炸雞排，外酥內嫩，是士林夜市最具代表性的招牌美食之一。</p>
    </div>

    <!-- 2 蚵仔煎 -->
    <div class="food">
        <img src="images/2photo.jpg">
        <h2>蚵仔煎</h2>
        <p>以新鮮蚵仔、雞蛋與地瓜粉製成，搭配甜辣醬，是台灣經典小吃。</p>
    </div>

    <!-- 3 大腸包小腸 -->
    <div class="food">
        <img src="images/3photo.jpg">
        <h2>大腸包小腸</h2>
        <p>糯米腸包香腸，再加上蒜片與配料，口感豐富，風味十足。</p>
    </div>

    <!-- 4 珍珠奶茶 -->
    <div class="food">
        <img src="images/4photo.jpg">
        <h2>珍珠奶茶</h2>
        <p>台灣代表飲品，Q彈珍珠搭配香濃奶茶，深受國內外遊客喜愛。</p>
    </div>

    <!-- 5 花枝燒 -->
    <div class="food">
        <img src="images/5photo.jpg">
        <h2>花枝燒</h2>
        <p>外酥內軟的花枝料理，口感彈牙，是夜市必吃的海鮮小吃。</p>
    </div>

</div>

<footer>
    © 士林夜市美食介紹 | 學生作業展示
</footer>

</body>
</html>
